name: Remove Submodule
on:
  workflow_dispatch:

jobs:
  remove:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          submodules: true

      - name: Remove submodule
        run: |
          git submodule deinit -f -- app/src/main/cpp/OpenXR
          git rm -f app/src/main/cpp/OpenXR
          rm -rf .git/modules/app/src/main/cpp/OpenXR

      - name: Commit and push
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add -A
          git commit -m "Remove OpenXR submodule" || echo "Nothing to commit"
          git push
