name: Setup Proper Submodule

on:
  workflow_dispatch:

jobs:
  fix-and-submodule:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout MaliMail
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup and Add Submodule
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # 1. Удаляем файлы, которые "нагрязнили" (если они есть)
          rm -rf include src CMakeLists.txt LICENSE README.md build.sh logo.png vortek_icd.aarch64.json
          
          # 2. Добавляем Vortek как субмодуль в папку 'vortek-sub'
          # (В корень 'app/src/main/res' нельзя, т.к. там уже есть файлы проекта)
          git submodule add --force https://github.com/brunodev85/vortek vortek-core
          
          git add .
          git commit -m "Fixed: Removed loose files and added Vortek as proper submodule" || echo "Nothing to fix"
          git push
