name: MaliMail-Build

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo (NO SUBMODULES)
        uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 0

      - name: HARD remove broken submodules (OpenXR fix)
        run: |
          git config --global submodule.recurse false
          git submodule deinit -f --all || true
          git rm -r --cached app/src/main/cpp/OpenXR-SDK || true
          rm -rf app/src/main/cpp/OpenXR-SDK || true
          rm -f .gitmodules || true

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK
        run: |
          yes | sdkmanager \
            "platform-tools" \
            "platforms;android-33" \
            "build-tools;33.0.2"

      - name: Accept licenses
        run: yes | sdkmanager --licenses

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Install Gradle (NO WRAPPER)
        run: |
          wget https://services.gradle.org/distributions/gradle-8.0.2-bin.zip -O gradle.zip
          unzip -q gradle.zip
          echo "$PWD/gradle-8.0.2/bin" >> $GITHUB_PATH

      - name: Build APK
        run: |
          gradle :app:assembleDebug --no-daemon --stacktrace --info 2>&1 | tee build.log

      - name: Show logs on failure
        if: failure()
        run: tail -200 build.log || true

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: MaliMail-APK
          path: app/build/outputs/apk/debug/*.apk
