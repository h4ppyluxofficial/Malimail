name: Build Winlator APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch: # Позволяет запускать сборку вручную

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive # Важно для Winlator, так как он использует субмодули

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew assembleDebug # Собирает дебаг-версию. Для релизной используйте assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: winlator-debug-apk
          path: app/build/outputs/apk/debug/*.apk
