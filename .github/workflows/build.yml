name: MaliMail-Force-Correction
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: false # Игнорируем битые ссылки OpenXR

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c

      - name: Rebuild Project Structure
        run: |
          # 1. Создаем чистый корневой билд
          cat <<EOF > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.0.0' }
          }
          allprojects {
              repositories { google(); mavenCentral() }
          }
          EOF

          # 2. Создаем чистый файл настроек
          echo "include ':app'" > settings.gradle
          
          # 3. Указываем пути к инструментам
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "ndk.dir=$ANDROID_NDK_HOME" >> local.properties

      - name: Build APK
        # Запускаем сборку через системный gradle, чтобы не спотыкаться о кэш
        run: gradle :app:assembleDebug --stacktrace --no-daemon

      - name: Upload
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Build-Output
          path: "app/build/outputs/apk/debug/*.apk"
