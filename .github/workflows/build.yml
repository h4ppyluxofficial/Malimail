name: MaliMail-Final-Boss

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  assemble-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c

      - name: Sync Project Structure
        run: |
          # Принудительно создаем структуру, если ее нет
          echo "include ':app'" > settings.gradle
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "ndk.dir=$ANDROID_NDK_HOME" >> local.properties

      - name: Build with Gradle
        # Мы НЕ используем экшен, который ищет gradlew. 
        # Мы запускаем gradle напрямую через систему.
        run: |
          gradle :app:assembleDebug --stacktrace -x lint

      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: MaliMail-Alpha
          path: "app/build/outputs/apk/debug/*.apk"
