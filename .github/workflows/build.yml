name: MaliMail-Submodule-Killer
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: false # Пробуем еще раз

      - name: Force Remove Submodule References
        # МЫ УДАЛЯЕМ ВСЁ МЯСО САБМОДУЛЕЙ ИЗ КОНФИГА
        run: |
          git rm --cached app/src/main/cpp/OpenXR-SDK || true
          rm -rf .gitmodules || true
          sed -i '/OpenXR-SDK/d' app/build.gradle || true

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c

      - name: Total Override structure
        run: |
          echo "include ':app'" > settings.gradle
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "ndk.dir=$ANDROID_NDK_HOME" >> local.properties
          sed -i '1i buildscript { repositories { google(); mavenCentral() }; dependencies { classpath "com.android.tools.build:gradle:8.0.0" } }' app/build.gradle
          sed -i '/android {/a \    namespace "com.winlator"' app/build.gradle

      - name: Build APK
        run: |
          export GRADLE_OPTS="-Dorg.gradle.jvmargs=-Xmx2048m -Dandroid.useNewApkCreator=false"
          gradle :app:assembleDebug --stacktrace --no-daemon -Pandroid.skipResourceValidation=true
