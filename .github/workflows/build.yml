name: MaliMail-Build

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 1

      - name: Fix submodules and OpenXR ghost
        run: |
          git config --global submodule.recurse false
          rm -f .gitmodules || true
          rm -rf .git/modules || true
          git submodule deinit -f --all 2>/dev/null || true
          rm -rf app/src/main/cpp/OpenXR-SDK || true
          mkdir -p app/src/main/cpp/OpenXR-SDK

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK build-tools
        run: |
          export JAVA_OPTS="-Xmx2G"
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platform-tools" \
            "platforms;android-33" \
            "build-tools;33.0.2" \
            "cmake;3.22.1" "ndk;25.2.9519653" 2>/dev/null || true
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Setup NDK r25c
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c
          add-to-path: true

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "ndk.dir=${{ steps.setup-ndk.outputs.ndk-path }}" >> local.properties
          echo "cmake.dir=$ANDROID_HOME/cmake/3.22.1" >> local.properties

      - name: Prepare Gradle Wrapper
        run: |
          # Просто оживляем то, что у тебя уже есть в репозитории
          chmod +x ./gradlew || true
          # Если вдруг файла нет, создаем его через системный gradle
          if [ ! -f "./gradlew" ]; then
            sudo apt-get update && sudo apt-get install gradle -y
            gradle wrapper --gradle-version 8.0.2
          fi
          chmod +x ./gradlew

      - name: Build Debug APK
        env:
          GRADLE_OPTS: >-
            -Dorg.gradle.jvmargs=-Xmx4g
            -Dorg.gradle.daemon=false
            -Dorg.gradle.parallel=false
        run: |
          # Мы не используем tee, чтобы GitHub сразу видел ошибку, если она будет
          ./gradlew :app:assembleDebug --no-daemon --stacktrace -x test

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: MaliMail-APK
          path: "app/build/outputs/apk/debug/*.apk"
          retention-days: 7

      - name: Show error on failure
        if: failure()
        run: |
          echo "Сборка упала. Проверь логи выше или скачай артефакт с логом (если настроен)."
