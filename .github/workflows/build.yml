name: MaliMail-Build

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Принудительно отключаем автоматическую работу с сабмодулями
          submodules: false
          fetch-depth: 1
          clean: true

      - name: Total Submodule Exorcism
        run: |
          # 1. Говорим гиту забыть про сабмодули в текущей сессии
          git config --local submodule.recurse false
          
          # 2. Удаляем упоминания о сабмодулях из индекса (это лечит ошибку 128)
          git rm -rf --cached .gitmodules || true
          git rm -rf --cached app/src/main/cpp/OpenXR-SDK || true
          
          # 3. Физически удаляем папку сабмодуля, если она скачалась как пустая ссылка
          rm -rf app/src/main/cpp/OpenXR-SDK || true
          
          # 4. Создаем заглушку, чтобы CMake не ругался на пустое место
          mkdir -p app/src/main/cpp/OpenXR-SDK
          echo "add_library(openxr_ghost STATIC EXCLUDE_FROM_ALL winlator/drawable.c)" > app/src/main/cpp/OpenXR-SDK/CMakeLists.txt

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Setup NDK r25c
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "ndk.dir=${{ steps.setup-ndk.outputs.ndk-path }}" >> local.properties
          echo "cmake.dir=$ANDROID_HOME/cmake/3.22.1" >> local.properties

      - name: Fix and Generate Gradlew
        run: |
          # Скачиваем чистый Gradle, чтобы избежать ошибок с JAR-файлом
          wget -q https://services.gradle.org/distributions/gradle-8.0.2-bin.zip
          unzip -q gradle-8.0.2-bin.zip
          ./gradle-8.0.2/bin/gradle wrapper --gradle-version 8.0.2
          chmod +x ./gradlew

      - name: Build Debug APK
        env:
          GRADLE_OPTS: >-
            -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=1g"
            -Dorg.gradle.daemon=false
        run: |
          # Собираем MaliMail
          ./gradlew :app:assembleDebug --no-daemon --stacktrace -x test

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: MaliMail-APK
          path: "app/build/outputs/apk/debug/*.apk"
          retention-days: 7
