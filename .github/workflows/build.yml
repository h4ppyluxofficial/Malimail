name: MaliMail-Final-Boss

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  assemble-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c

      - name: Fix Project Files
        run: |
          # Создаем правильный settings.gradle
          echo "include ':app'" > settings.gradle
          
          # Создаем правильный local.properties
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "ndk.dir=$ANDROID_NDK_HOME" >> local.properties
          
          # Самое важное: если build.gradle кривой, мы его подправим. 
          # Мы добавим Google репозитории в начало, чтобы он мог скачать плагины.
          sed -i '1i buildscript { repositories { google(); mavenCentral() }; dependencies { classpath "com.android.tools.build:gradle:8.0.0" } }' app/build.gradle
          sed -i '1i allprojects { repositories { google(); mavenCentral() } }' app/build.gradle

      - name: Build APK
        run: |
          # Используем флаг --no-daemon для стабильности на слабых серверах
          gradle :app:assembleDebug --stacktrace --no-daemon -x lint

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: MaliMail-Alpha
          path: "app/build/outputs/apk/debug/*.apk"
