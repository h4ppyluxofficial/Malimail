name: MaliMail-Ultimate-Shield
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c

      - name: Fix Project structure
        run: |
          # Создаем чистые конфиги
          echo "include ':app'" > settings.gradle
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "ndk.dir=$ANDROID_NDK_HOME" >> local.properties
          
          # Инъекция репозиториев и фикс Namespace для AGP 8.0
          sed -i '1i buildscript { repositories { google(); mavenCentral() }; dependencies { classpath "com.android.tools.build:gradle:8.0.0" } }' app/build.gradle
          sed -i '/android {/a \    namespace "com.winlator"' app/build.gradle

      - name: Build APK
        # Здесь мы фиксим вылет AAPT2, ограничивая память и отключая лишние проверки
        run: |
          export GRADLE_OPTS="-Dorg.gradle.jvmargs=-Xmx2048m -Dandroid.useNewApkCreator=false"
          gradle :app:assembleDebug --stacktrace --no-daemon -Pandroid.skipResourceValidation=true

      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: MaliMail-Winlator-Ready
          path: "app/build/outputs/apk/debug/*.apk"
