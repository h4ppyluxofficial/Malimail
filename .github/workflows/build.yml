name: MaliMail-Build

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (NO SUBMODULES)
        uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 0

      - name: Disable submodules completely
        run: |
          rm -f .gitmodules || true
          git submodule deinit -f --all || true
          git config --global submodule.recurse false

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK tools
        run: |
          yes | sdkmanager \
            "platform-tools" \
            "platforms;android-33" \
            "build-tools;33.0.2"

      - name: Accept licenses
        run: yes | sdkmanager --licenses

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Build APK (NO GRADLE WRAPPER)
        run: |
          wget https://services.gradle.org/distributions/gradle-8.0.2-bin.zip -O gradle.zip
          unzip -q gradle.zip
          export PATH=$PWD/gradle-8.0.2/bin:$PATH

          gradle :app:assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MaliMail-debug-apk
          path: app/build/outputs/apk/debug/*.apk
