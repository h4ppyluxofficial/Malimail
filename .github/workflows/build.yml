name: MaliMail-Build

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 1

      - name: Fix submodules and OpenXR ghost
        run: |
          git config --global submodule.recurse false
          rm -f .gitmodules || true
          rm -rf .git/modules || true
          git submodule deinit -f --all 2>/dev/null || true
          rm -rf app/src/main/cpp/OpenXR-SDK || true
          mkdir -p app/src/main/cpp/OpenXR-SDK

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK build-tools
        run: |
          export JAVA_OPTS="-Xmx2G"
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platform-tools" \
            "platforms;android-33" \
            "build-tools;33.0.2" \
            "cmake;3.22.1" "ndk;25.2.9519653" 2>/dev/null || true
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Setup NDK r25c
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c
          add-to-path: true

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "ndk.dir=${{ steps.setup-ndk.outputs.ndk-path }}" >> local.properties
          echo "cmake.dir=$ANDROID_HOME/cmake/3.22.1" >> local.properties

      - name: Fix Gradle wrapper
        run: |
          mkdir -p gradle/wrapper
          wget -q https://services.gradle.org/distributions/gradle-8.0.2-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp/gradle-dist
          /tmp/gradle-dist/gradle-8.0.2/bin/gradle wrapper --gradle-version 8.0.2 --project-dir .
          chmod +x ./gradlew

      - name: Debug processDebugResources
        env:
          GRADLE_OPTS: >-
            -Dorg.gradle.jvmargs=-Xmx4g
            -Dorg.gradle.daemon=false
            -Dorg.gradle.parallel=false
        run: |
          ./gradlew :app:processDebugResources \
            --no-daemon \
            --stacktrace \
            --info \
            2>&1 | tee build_output.log || true
          echo "=== AAPT2 ERRORS ==="
          grep -iE "aapt2|error:|FAILED|exception|R\.java|processDebug" build_output.log | head -80

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build_output.log
          retention-days: 3
