name: MaliMail-Fix-Namespace
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c

      - name: Fix Project Files
        run: |
          # 1. Создаем базовые настройки
          echo "include ':app'" > settings.gradle
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "ndk.dir=$ANDROID_NDK_HOME" >> local.properties
          
          # 2. Добавляем репозитории в начало app/build.gradle
          sed -i '1i buildscript { repositories { google(); mavenCentral() }; dependencies { classpath "com.android.tools.build:gradle:8.0.0" } }' app/build.gradle
          
          # 3. ФИКС NAMESPACE: Добавляем его в блок android { ... }
          # Мы просто вставим его после слова 'android {'
          sed -i '/android {/a \    namespace "com.winlator"' app/build.gradle

      - name: Build APK
        run: gradle :app:assembleDebug --stacktrace --no-daemon
