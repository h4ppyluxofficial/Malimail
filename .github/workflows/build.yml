- name: Build APK
        run: |
          # Ищем, где лежит settings.gradle
          PROJECT_ROOT=$(find . -name "settings.gradle" -printf '%h' -quit)
          cd "$PROJECT_ROOT"
          # Даем права на выполнение (на всякий случай)
          chmod +x gradlew || true
          # Запускаем сборку именно модуля app
          ./gradlew :app:assembleDebug || gradle :app:assembleDebug
