name: MaliMail-Final-Shield
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false # Игнорируем проблемные ссылки OpenXR

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c

      - name: Auto-Fix Project Structure
        # Этот блок заменяет битые конфиги Brunodev на рабочие
        run: |
          cat <<EOF > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.0.0' }
          }
          allprojects {
              repositories { google(); mavenCentral() }
          }
          EOF
          echo "include ':app'" > settings.gradle
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "ndk.dir=$ANDROID_NDK_HOME" >> local.properties

      - name: Force Build With Info
        # Добавляем --info, чтобы если упадет, мы видели точную причину
        run: ./gradlew :app:assembleDebug --stacktrace --info --no-daemon || gradle :app:assembleDebug --stacktrace --info --no-daemon

      - name: Upload Result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Winlator-Build-Log
          path: "app/build/outputs/apk/debug/*.apk"
