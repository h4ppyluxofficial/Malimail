name: Build MaliMail
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Gradle
        run: |
          sudo apt-get update
          sudo apt-get install -y gradle

      - name: Build APK
        run: |
          # Ищем файл settings.gradle, заходим в его папку и строим оттуда
          PROJECT_ROOT=$(find . -name "settings.gradle" -printf '%h' -quit)
          cd "$PROJECT_ROOT" && gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MaliMail-APK
          path: "**/*.apk"
