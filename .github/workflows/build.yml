name: Build MaliMail
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Build with Gradle
        run: |
          # Эта команда сама найдет нужный файл и запустит сборку, где бы он ни лежал
          find . -name "gradlew" -exec chmod +x {} +
          find . -name "gradlew" -execdir {} assembleDebug \;

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MaliMail-APK
          path: "**/*.apk"
