name: Build MaliMail
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c

      - name: Fix Project Structure and Plugins
        run: |
          # 1. Создаем корневой build.gradle с репозиториями и плагинами
          cat <<EOF > build.gradle
          buildscript {
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.1.0'
              }
          }
          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          EOF

          # 2. Создаем settings.gradle, чтобы связать всё
          echo "include ':app'" > settings.gradle
          echo "rootProject.name = 'MaliMail'" >> settings.gradle

          # 3. Генерируем Gradle Wrapper нужной версии
          gradle wrapper --gradle-version 8.1
          chmod +x gradlew

      - name: Build APK
        run: |
          # Игнорируем ошибки линта и тесты, чтобы быстрее собралось
          ./gradlew :app:assembleDebug --stacktrace -x lint -x test

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MaliMail-Debug
          path: "**/build/outputs/apk/debug/*.apk"
