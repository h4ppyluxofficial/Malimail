name: MaliMail-Ultimate-Fix
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false # Игнорируем битые сабмодули

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c

      - name: Inject Root Config
        # МЫ СОЗДАЕМ КОРНЕВОЙ ФАЙЛ, КОТОРОГО НЕ ХВАТАЛО
        run: |
          cat <<EOF > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.0.0' }
          }
          allprojects {
              repositories { google(); mavenCentral() }
          }
          EOF
          echo "include ':app'" > settings.gradle
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "ndk.dir=$ANDROID_NDK_HOME" >> local.properties

      - name: Build APK
        # Собираем только модуль app
        run: gradle :app:assembleDebug --stacktrace --no-daemon

      - name: Upload
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: MaliMail-Final-Result
          path: "app/build/outputs/apk/debug/*.apk"
