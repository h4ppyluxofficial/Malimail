name: MaliMail-Build

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 1

      - name: Fix submodules
        run: |
          git config --global submodule.recurse false
          rm -f .gitmodules || true
          rm -rf .git/modules || true
          git submodule deinit -f --all || true

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK build-tools
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platform-tools" \
            "platforms;android-33" \
            "build-tools;33.0.2" \
            "cmake;3.22.1" 2>/dev/null || true
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Setup NDK r25c
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c
          add-to-path: true

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "ndk.dir=${{ steps.setup-ndk.outputs.ndk-path }}" >> local.properties

      - name: Build Debug APK
        env:
          GRADLE_OPTS: >-
            -Dorg.gradle.jvmargs=-Xmx3g
            -Dorg.gradle.daemon=false
            -Dorg.gradle.parallel=false
        run: |
          chmod +x ./gradlew
          ./gradlew :app:assembleDebug \
            --no-daemon \
            --stacktrace \
            --info \
            2>&1 | tee build_output.log

          echo "=== Ищем APK ==="
          find . -name "*.apk" -path "*/debug/*" && echo "APK найден!" || echo "APK не найден"

      - name: Show error context on failure
        if: failure()
        run: |
          tail -100 build_output.log || true
          grep -i "error\|failed\|aapt2" build_output.log | tail -50 || true

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: MaliMail-APK
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: malimail-build-failure-log
          path: build_output.log
          retention-days: 3
