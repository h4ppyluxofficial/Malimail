name: MaliMail-Engine-Build # Даем свое гордое имя

on:
  push:
    branches: [ "main" ] # Исправили на твою реальную ветку
  pull_request:
    branches: [ "main" ]

jobs:
  assemble-apk: # Переименовали работу
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4 # Используем стабильную v4

      - name: Setup Java Environment
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c # Без этого твои C++ исходники не соберутся

      - name: Manual Project Sync
        # Вместо "списывания" создаем структуру проекта сами
        run: |
          echo "include ':app'" > settings.gradle
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "ndk.dir=$ANDROID_NDK_HOME" >> local.properties

      - name: Compile MaliMail
        # Используем системный gradle, так как обертки (gradlew) у тебя нет
        run: gradle :app:assembleDebug --stacktrace

      - name: Capture Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MaliMail-Dev-Build
          # Указываем путь по маске, чтобы точно найти файл
          path: "app/build/outputs/apk/debug/*.apk"
