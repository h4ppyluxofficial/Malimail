name: Build MaliMail
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Gradle Manually
        run: |
          # Принудительно ставим Gradle в систему
          sudo apt-get update
          sudo apt-get install -y gradle

      - name: Build APK
        run: |
          # Заходим в папку с проектом (если надо) и строим
          # Мы используем 'gradle', потому что только что его установили
          gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MaliMail-APK
          path: "**/build/outputs/apk/debug/*.apk"
