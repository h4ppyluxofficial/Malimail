name: MaliMail-Build

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 1
          clean: true

      - name: Nuclear Submodule Cleanup
        run: |
          git config --global submodule.recurse false
          rm -f .gitmodules || true
          git rm -rf --cached app/src/main/cpp/OpenXR-SDK || true
          rm -rf app/src/main/cpp/OpenXR-SDK || true
          mkdir -p app/src/main/cpp/OpenXR-SDK
          # Заглушка, чтобы CMake не ругался на отсутствие папки
          echo "add_library(openxr_ghost STATIC EXCLUDE_FROM_ALL winlator/drawable.c)" > app/src/main/cpp/OpenXR-SDK/CMakeLists.txt

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Setup NDK r25c
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c
          add-to-path: true

      - name: Setup Android SDK
        run: |
          # Устанавливаем только нужное, не дублируя NDK
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platform-tools" \
            "platforms;android-33" \
            "build-tools;33.0.2" \
            "cmake;3.22.1"
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "ndk.dir=${{ steps.setup-ndk.outputs.ndk-path }}" >> local.properties
          echo "cmake.dir=$ANDROID_HOME/cmake/3.22.1" >> local.properties

      - name: Force Generate Gradle Wrapper
        run: |
          # Оставляем установку gradle для генерации wrapper, если его нет в репо
          sudo apt-get update && sudo apt-get install gradle -y
          gradle wrapper --gradle-version 8.0.2
          chmod +x ./gradlew

      - name: Build Debug APK
        env:
          # Увеличил лимиты памяти и добавил Metaspace, чтобы jar-файлы не "отваливались"
          GRADLE_OPTS: >-
            -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=1g"
            -Dorg.gradle.daemon=false
            -Dorg.gradle.parallel=false
        run: |
          # Выполняем сборку
          ./gradlew clean :app:assembleDebug --no-daemon --stacktrace -x test

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: MaliMail-APK
          path: "app/build/outputs/apk/debug/*.apk"
          retention-days: 7

      - name: Failure Report
        if: failure()
        run: |
          echo "Билд споткнулся. Проверь логи шага 'Build Debug APK'."
          ls -R app/src/main/cpp/OpenXR-SDK || echo "OpenXR folder is gone"
