name: MaliMail# Вайбкодированное чудо запускается с помощью ии

on:
  push:
    branches: [ "main" ] # Твоя ветка
  workflow_dispatch: # Добавил кнопку, чтобы запускать билд вручную

jobs:
  assemble-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c # r25c — база для Winlator проектов

      - name: Sync Project Structure
        run: |
          # Создаем файл настроек, чтобы Gradle увидел модуль app
          echo "include ':app'" > settings.gradle
          # Прописываем пути, чтобы билд не заблудился
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "ndk.dir=$ANDROID_NDK_HOME" >> local.properties

      - name: Build with Gradle Action
        # Это "умный" способ запуска сборки, который сам подберет нужные настройки
        uses: gradle/gradle-build-action@v3
        with:
          arguments: :app:assembleDebug --stacktrace -x lint

      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: MaliMail-Alpha
          path: "app/build/outputs/apk/debug/*.apk"
