name: MaliMail-Build

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Отключаем всё, что связано с сабмодулями на уровне экшена
          submodules: false
          fetch-depth: 1

      - name: Kill the Submodule Ghost
        run: |
          # 1. Стираем все системные настройки сабмодулей
          git config --global submodule.recurse false
          
          # 2. Удаляем файлы конфигурации сабмодулей, если они просочились
          rm -f .gitmodules || true
          
          # 3. Самое важное: вычищаем OpenXR из индекса Гита принудительно
          # Это уберет ту самую ошибку 128
          git rm -r --cached app/src/main/cpp/OpenXR-SDK || true
          
          # 4. Стираем папку физически и создаем пустую заглушку для CMake
          rm -rf app/src/main/cpp/OpenXR-SDK || true
          mkdir -p app/src/main/cpp/OpenXR-SDK
          # Создаем пустой файл, чтобы CMake не ругался на пустую директорию
          touch app/src/main/cpp/OpenXR-SDK/CMakeLists.txt

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK build-tools
        run: |
          export JAVA_OPTS="-Xmx2G"
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platform-tools" \
            "platforms;android-33" \
            "build-tools;33.0.2" \
            "cmake;3.22.1" "ndk;25.2.9519653" 2>/dev/null || true
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Setup NDK r25c
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c
          add-to-path: true

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "ndk.dir=${{ steps.setup-ndk.outputs.ndk-path }}" >> local.properties
          echo "cmake.dir=$ANDROID_HOME/cmake/3.22.1" >> local.properties

      - name: Prepare Gradle Wrapper
        run: |
          # Даем права на запуск
          chmod +x ./gradlew || true
          # Если файла нет — создаем его через системный gradle
          if [ ! -f "./gradlew" ]; then
            sudo apt-get update && sudo apt-get install gradle -y
            gradle wrapper --gradle-version 8.0.2
            chmod +x ./gradlew
          fi

      - name: Build Debug APK
        env:
          GRADLE_OPTS: >-
            -Dorg.gradle.jvmargs=-Xmx4g
            -Dorg.gradle.daemon=false
            -Dorg.gradle.parallel=false
        run: |
          # Запускаем чистую сборку MaliMail
          ./gradlew clean :app:assembleDebug --no-daemon --stacktrace -x test

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: MaliMail-APK
          path: "app/build/outputs/apk/debug/*.apk"
          retention-days: 7

      - name: Show error on failure
        if: failure()
        run: |
          echo "Сборка всё еще капризничает. Проверь логи шага Build Debug APK."
