name: Build MaliMail
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build with Gradle
        run: |
          # Ищем папку, где реально лежит settings.gradle
          target_dir=$(find . -name "settings.gradle" -printf '%h\n' | head -n 1)
          echo "Реальная папка проекта: $target_dir"
          cd "$target_dir"
          # Даем права на gradlew, если он есть
          find . -name "gradlew" -exec chmod +x {} +
          # Запускаем сборку
          if [ -f "./gradlew" ]; then
            ./gradlew assembleDebug
          else
            gradle assembleDebug
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MaliMail-Final
          path: "**/*.apk"
