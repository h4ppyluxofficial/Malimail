name: MaliMail-Build

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Принудительно отключаем любую логику сабмодулей
          submodules: false
          fetch-depth: 1
          # Очищаем рабочую директорию перед скачиванием
          clean: true

      - name: Nuclear Submodule Cleanup
        run: |
          # 1. Заставляем гит забыть про сабмодули на системном уровне
          git config --global submodule.recurse false
          
          # 2. Удаляем файлы конфигурации, если они есть
          rm -f .gitmodules || true
          
          # 3. Вычищаем OpenXR из индекса Гита (чтобы не было ошибки 128)
          git rm -rf --cached app/src/main/cpp/OpenXR-SDK || true
          
          # 4. Стираем физические следы и создаем заглушку для CMake
          rm -rf app/src/main/cpp/OpenXR-SDK || true
          mkdir -p app/src/main/cpp/OpenXR-SDK
          echo "add_library(openxr_ghost STATIC EXCLUDE_FROM_ALL winlator/drawable.c)" > app/src/main/cpp/OpenXR-SDK/CMakeLists.txt

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK build-tools
        run: |
          export JAVA_OPTS="-Xmx2G"
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platform-tools" \
            "platforms;android-33" \
            "build-tools;33.0.2" \
            "cmake;3.22.1" "ndk;25.2.9519653" 2>/dev/null || true
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Setup NDK r25c
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c
          add-to-path: true

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "ndk.dir=${{ steps.setup-ndk.outputs.ndk-path }}" >> local.properties
          echo "cmake.dir=$ANDROID_HOME/cmake/3.22.1" >> local.properties

      - name: Force Generate Gradle Wrapper
        run: |
          # Чтобы не зависеть от того, что есть в репозитории, создаем с нуля
          sudo apt-get update && sudo apt-get install gradle -y
          gradle wrapper --gradle-version 8.0.2
          chmod +x ./gradlew

      - name: Build Debug APK
        env:
          GRADLE_OPTS: >-
            -Dorg.gradle.jvmargs=-Xmx4g
            -Dorg.gradle.daemon=false
            -Dorg.gradle.parallel=false
        run: |
          # Пробуем запустить сборку. 
          # После clean гитхаб скачает все нужные либы сам.
          ./gradlew clean :app:assembleDebug --no-daemon --stacktrace -x test

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: MaliMail-APK
          path: "app/build/outputs/apk/debug/*.apk"
          retention-days: 7

      - name: Failure Report
        if: failure()
        run: |
          echo "Билд споткнулся. Проверь логи шага 'Build Debug APK'."
          ls -R app/src/main/cpp/OpenXR-SDK || echo "OpenXR folder is gone"
