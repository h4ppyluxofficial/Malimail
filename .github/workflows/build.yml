name: MaliMail-Resource-Pass
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c

      - name: Fix Everything
        run: |
          echo "include ':app'" > settings.gradle
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "ndk.dir=$ANDROID_NDK_HOME" >> local.properties
          
          # Инъекция конфигов
          sed -i '1i buildscript { repositories { google(); mavenCentral() }; dependencies { classpath "com.android.tools.build:gradle:8.0.0" } }' app/build.gradle
          sed -i '/android {/a \    namespace "com.winlator"\n    buildFeatures { buildConfig true }' app/build.gradle
          
          # ФИКС: Отключаем строгую проверку ресурсов, которая вешает билд на 1000333809.png
          echo "android.aapt2FromMavenOverride=$ANDROID_HOME/build-tools/33.0.0/aapt2" >> local.properties

      - name: Build APK
        run: |
          # Даем еще больше свободы при сборке ресурсов
          gradle :app:assembleDebug --stacktrace --no-daemon \
          -Pandroid.skipResourceValidation=true \
          -Pandroid.verifyAapt2Compile=false
