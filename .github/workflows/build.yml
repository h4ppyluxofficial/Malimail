name: MaliMail-Build

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout без submodules
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 0

      # 2. Жёстко убираем следы submodules
      - name: Remove broken submodules
        run: |
          rm -f .gitmodules || true
          git config --global submodule.recurse false
          git rm -r --cached app/src/main/cpp/OpenXR-SDK || true
          rm -rf app/src/main/cpp/OpenXR-SDK || true

      # 3. Java
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # 4. Android SDK
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # 5. SDK packages
      - name: Install SDK
        run: |
          yes | sdkmanager \
            "platform-tools" \
            "platforms;android-33" \
            "build-tools;33.0.2"

      # 6. Licenses
      - name: Accept licenses
        run: yes | sdkmanager --licenses

      # 7. local.properties
      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      # 8. Скачиваем нормальный Gradle (без wrapper)
      - name: Install Gradle
        run: |
          wget https://services.gradle.org/distributions/gradle-8.0.2-bin.zip -O gradle.zip
          unzip -q gradle.zip
          echo "$PWD/gradle-8.0.2/bin" >> $GITHUB_PATH

      # 9. Build APK
      - name: Build Debug APK
        run: |
          gradle :app:assembleDebug --no-daemon --stacktrace

      # 10. Upload APK
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: mali-mail-apk
          path: app/build/outputs/apk/debug/*.apk
