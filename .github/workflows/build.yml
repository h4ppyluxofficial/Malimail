name: Build MaliMail
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant Permissions and Build
        run: |
          # Находим все gradlew и даем им права
          find . -name "gradlew" -exec chmod +x {} +
          # Магия: находим папку с gradlew, прыгаем в неё и запускаем сборку
          GRADLEW_PATH=$(find . -name "gradlew" -printf '%h' -quit)
          cd "$GRADLEW_PATH" && ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MaliMail-APK
          path: "**/*.apk" # Ищет все готовые APK во всех папках
