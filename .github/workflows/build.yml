name: Build MaliMail
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant Permissions and Build
        run: |
          # Ищем gradlew и даем права, где бы он ни был
          find . -name "gradlew" -exec chmod +x {} +
          # Запускаем сборку из корня, если не выйдет - попробуем найти путь
          ./gradlew assembleDebug || (cd $(find . -name "gradlew" -printf '%h' -quit) && ./gradlew assembleDebug)
