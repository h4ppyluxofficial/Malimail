name: MaliMail-Build

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 1

      - name: Fix submodules and OpenXR ghost
        run: |
          git config --global submodule.recurse false
          rm -f .gitmodules || true
          rm -rf .git/modules || true
          git submodule deinit -f --all 2>/dev/null || true
          rm -rf app/src/main/cpp/OpenXR-SDK || true
          # Создаем пустую папку, если код ее требует, но она удалена
          mkdir -p app/src/main/cpp/OpenXR-SDK

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK build-tools
        run: |
          # Увеличиваем лимиты памяти для SDK manager
          export JAVA_OPTS="-Xmx2G"
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platform-tools" \
            "platforms;android-33" \
            "build-tools;33.0.2" \
            "cmake;3.22.1" "ndk;25.2.9519653" 2>/dev/null || true
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Setup NDK r25c
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c
          add-to-path: true

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "ndk.dir=${{ steps.setup-ndk.outputs.ndk-path }}" >> local.properties
          # Добавляем путь к cmake, это критично для Winlator
          echo "cmake.dir=$ANDROID_HOME/cmake/3.22.1" >> local.properties

      - name: Fix Gradle wrapper
        run: |
          mkdir -p gradle/wrapper
          # Если файла нет, скачиваем его, а не просто копируем
          wget https://github.com/gradle/gradle/raw/v8.0.2/gradle/wrapper/gradle-wrapper.jar -O gradle/wrapper/gradle-wrapper.jar
          
          cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.0.2-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF

          cat > ./gradlew << 'GRADLEW'
          #!/bin/sh
          APP_HOME="$(cd "$(dirname "$0")" && pwd)"
          exec java \
            -classpath "$APP_HOME/gradle/wrapper/gradle-wrapper.jar" \
            org.gradle.wrapper.GradleWrapperMain "$@"
          GRADLEW

          chmod +x ./gradlew

      - name: Build Debug APK
        env:
          GRADLE_OPTS: >-
            -Dorg.gradle.jvmargs=-Xmx4g
            -Dorg.gradle.daemon=false
            -Dorg.gradle.parallel=false
            -Dorg.gradle.configureondemand=true
        run: |
          # Сначала пробуем просто собрать проект без тестов
          ./gradlew :app:assembleDebug \
            --no-daemon \
            --stacktrace \
            --info \
            -x test \
            2>&1 | tee build_output.log

      - name: Show error context on failure
        if: failure()
        run: |
          echo "=== LAST 200 LINES OF LOG ==="
          tail -n 200 build_output.log || true
          echo "=== SEARCHING FOR SPECIFIC ERRORS ==="
          grep -iE "error|failed|exception|aapt2" build_output.log | head -n 50 || true

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: MaliMail-APK
          path: "**/build/outputs/apk/debug/*.apk"
          retention-days: 7

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: malimail-build-failure-log
          path: build_output.log
          retention-days: 3
