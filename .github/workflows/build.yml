name: Build MaliMail
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Prepare Project Structure
        run: |
          # Создаем главный файл настроек, чтобы Gradle увидел модуль app
          echo "include ':app'" > settings.gradle
          # Прописываем путь к SDK
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          # Даем права на выполнение (на всякий случай)
          chmod +x app/build.gradle

      - name: Build with Gradle
        run: |
          # Запускаем сборку именно модуля app через системный Gradle
          gradle :app:assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MaliMail-Build
          path: "app/build/outputs/apk/debug/*.apk"
