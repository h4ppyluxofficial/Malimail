name: MaliMail-Build

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 1

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK build-tools
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "build-tools;33.0.2" \
            "platforms;android-33" 2>/dev/null || true

      - name: Setup NDK r25c
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c
          add-to-path: true

      - name: Prepare build environment
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "ndk.dir=${{ steps.setup-ndk.outputs.ndk-path }}" >> local.properties
          AAPT2_PATH=$(find $ANDROID_HOME/build-tools -name "aapt2" | sort -V | tail -1)
          echo "Найден aapt2: $AAPT2_PATH"
          echo "android.aapt2FromMavenOverride=$AAPT2_PATH" >> local.properties

      - name: Patch settings.gradle
        run: |
          cat > settings.gradle << 'EOF'
          pluginManagement {
            repositories {
              google()
              mavenCentral()
              gradlePluginPortal()
            }
          }
          dependencyResolutionManagement {
            repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
            repositories {
              google()
              mavenCentral()
            }
          }
          rootProject.name = "MaliMail"
          include ':app'
          EOF

      - name: Patch app/build.gradle
        run: |
          BUILDFILE="app/build.gradle"

          if ! grep -q "com.android.tools.build:gradle" "$BUILDFILE"; then
            echo "Добавляем buildscript блок..."
            cat > /tmp/buildscript_header.gradle << 'EOF'
          buildscript {
            repositories {
              google()
              mavenCentral()
            }
            dependencies {
              classpath 'com.android.tools.build:gradle:8.0.0'
            }
          }
          EOF
            cat /tmp/buildscript_header.gradle "$BUILDFILE" > /tmp/merged_build.gradle
            mv /tmp/merged_build.gradle "$BUILDFILE"
          fi

          if ! grep -q 'namespace' "$BUILDFILE"; then
            sed -i '/android {/a\    namespace "com.winlator"' "$BUILDFILE"
          fi

          if ! grep -q 'buildFeatures' "$BUILDFILE"; then
            sed -i '/namespace "com.winlator"/a\    buildFeatures { buildConfig true }' "$BUILDFILE"
          fi

          # Перезаписываем ndkVersion на r25c
          sed -i 's/ndkVersion "[^"]*"/ndkVersion "25.2.9519653"/' "$BUILDFILE"
          if ! grep -q 'ndkVersion' "$BUILDFILE"; then
            sed -i '/namespace "com.winlator"/a\    ndkVersion "25.2.9519653"' "$BUILDFILE"
          fi

          echo "=== app/build.gradle (первые 40 строк) ==="
          head -40 "$BUILDFILE"

      - name: Fix broken resources
        run: |
          echo "Ищем проблемные ресурсы..."
          find app/src/main/res -type f | while read f; do
            BASENAME=$(basename "$f")
            if echo "$BASENAME" | grep -qP '^\d{7,}'; then
              echo "УДАЛЯЕМ: $f"
              rm -f "$f"
            fi
          done || true
          find ~/.gradle -name "*.lock" -delete 2>/dev/null || true

      - name: Generate Gradle Wrapper
        run: |
          if [ ! -f "./gradlew" ]; then
            echo "gradlew не найден, генерируем..."
            wget -q https://services.gradle.org/distributions/gradle-8.0-bin.zip -O /tmp/gradle.zip
            unzip -q /tmp/gradle.zip -d /tmp/gradle-install
            GRADLE_BIN=$(find /tmp/gradle-install -name "gradle" -type f | head -1)
            $GRADLE_BIN wrapper --gradle-version 8.0 --distribution-type bin
            echo "gradlew создан"
          else
            echo "gradlew уже есть"
          fi
          chmod +x ./gradlew

      - name: Build Debug APK
        env:
          GRADLE_OPTS: >-
            -Dorg.gradle.jvmargs=-Xmx3g
            -Dorg.gradle.daemon=false
            -Dorg.gradle.parallel=false
            -Dorg.gradle.configureondemand=false
        run: |
          ./gradlew :app:assembleDebug \
            --no-daemon \
            --stacktrace \
            --info \
            -Pandroid.skipResourceValidation=true \
            -Pandroid.enableParallelJsonGen=false \
            2>&1 | tee build_output.log

          echo "=== Ищем APK ==="
          find . -name "*.apk" -path "*/debug/*" 2>/dev/null && echo "APK найден!" || echo "APK не найден"

      - name: Show error context on failure
        if: failure()
        run: |
          echo "=== Последние 100 строк лога ==="
          tail -100 build_output.log || true
          echo "=== AAPT2 / ERROR строки ==="
          grep -i "aapt2\|error\|failed" build_output.log | tail -50 || true

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: malimail-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: malimail-build-failure-log
          path: build_output.log
          retention-days: 3
