name: MaliMail-Build

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # =========================
      # CHECKOUT (NO SUBMODULES)
      # =========================
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 0

      # =========================
      # REMOVE BROKEN SUBMODULES
      # =========================
      - name: HARD remove OpenXR-SDK
        run: |
          git config --global submodule.recurse false
          rm -f .gitmodules || true
          git submodule deinit -f --all || true
          git rm -r --cached app/src/main/cpp/OpenXR-SDK || true
          rm -rf app/src/main/cpp/OpenXR-SDK || true

      # =========================
      # JAVA
      # =========================
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # =========================
      # ANDROID SDK
      # =========================
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK tools
        run: |
          yes | sdkmanager \
            "platform-tools" \
            "platforms;android-33" \
            "build-tools;33.0.2"

      - name: Accept licenses
        run: yes | sdkmanager --licenses

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      # =========================
      # GRADLE (NO WRAPPER)
      # =========================
      - name: Install Gradle
        run: |
          wget https://services.gradle.org/distributions/gradle-8.0.2-bin.zip -O gradle.zip
          unzip -q gradle.zip
          echo "$PWD/gradle-8.0.2/bin" >> $GITHUB_PATH

      # =========================
      # BUILD APK (FULL LOG)
      # =========================
      - name: Build Debug APK
        run: |
          gradle :app:assembleDebug --no-daemon --stacktrace --info 2>&1 | tee build.log

      # =========================
      # SHOW ERROR IF FAIL
      # =========================
      - name: Show build log on failure
        if: failure()
        run: |
          echo "========== LAST LOG =========="
          tail -300 build.log || true

      # =========================
      # UPLOAD APK
      # =========================
      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: MaliMail-APK
          path: app/build/outputs/apk/debug/*.apk
