name: Build MaliMail
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Build APK
        run: |
          # Заходим прямо в папку app, где ты нашёл файл
          cd app
          # Даем права на запуск
          chmod +x gradlew
          # Запускаем сборку
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MaliMail-APK
          path: "**/build/outputs/apk/debug/*.apk"
