name: Build MaliMail
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Fix and Build
        run: |
          # Создаем запускатор с нуля через системный gradle
          gradle wrapper
          # Даем права
          chmod +x gradlew
          # Запускаем через локальный файл
          ./gradlew assembleDebug
