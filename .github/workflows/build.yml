name: Build MaliMail APK

on:
  push:
    branches: [ main ]
  workflow_dispatch: # Чтобы можно было запустить вручную кнопкой

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: false # Отключаем авто-загрузку, чтобы не ругалось на битые пути

      - name: Sync Submodules (Manual)
        run: |
          git submodule sync
          git submodule update --init --recursive --depth 1 || echo "Submodules sync failed, but continuing..."

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew assembleDebug --stacktrace # Делаем Debug билд, он быстрее и не требует ключей

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MaliMail-DXVK-GPLALL
          path: app/build/outputs/apk/debug/*.apk
