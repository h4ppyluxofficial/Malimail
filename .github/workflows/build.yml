name: Build MaliMail
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build with Gradle
        run: |
          # Находим все gradlew и даем права
          find . -name "gradlew" -exec chmod +x {} +
          # Запускаем сборку
          ./gradlew assembleDebug || gradle assembleDebug

      - name: Find and Move APK
        run: |
          # Создаем папку для выгрузки
          mkdir -p output
          # Ищем любой APK, который создался, и копируем в нашу папку
          find . -name "*.apk" -exec cp {} ./output/ \;
          # Выводим список файлов, чтобы мы видели, создалось ли что-то
          ls -R ./output

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MaliMail-Final-Build
          path: output/*.apk
          if-no-files-found: error
